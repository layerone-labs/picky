name: Picky

on:
  workflow_call:
    inputs:
      provider:
        required: false
        type: string
        default: deepseek
      model:
        required: false
        type: string
      base_url:
        required: false
        type: string
      config_path:
        required: false
        type: string
        default: .ai-code-review.yml
      max_files:
        required: false
        type: string
        default: "20"
      max_patch_chars:
        required: false
        type: string
        default: "24000"
      post_summary:
        required: false
        type: string
        default: "true"
      min_severity_to_publish:
        required: false
        type: string
        default: low
    secrets:
      api_key:
        required: false
      DEEPSEEK_API_KEY:
        required: false

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/ai-pr-review
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DEEPSEEK_BASE_URL: ${{ vars.DEEPSEEK_BASE_URL }}
          DEEPSEEK_CODER_MODEL: ${{ vars.DEEPSEEK_CODER_MODEL }}
        with:
          provider: ${{ inputs.provider }}
          model: ${{ inputs.model }}
          api_key: ${{ secrets.api_key }}
          base_url: ${{ inputs.base_url }}
          config_path: ${{ inputs.config_path }}
          max_files: ${{ inputs.max_files }}
          max_patch_chars: ${{ inputs.max_patch_chars }}
          post_summary: ${{ inputs.post_summary }}
          min_severity_to_publish: ${{ inputs.min_severity_to_publish }}
