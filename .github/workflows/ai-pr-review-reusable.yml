name: Picky (Reusable)

on:
  workflow_call:
    inputs:
      provider:
        description: AI provider to use for review generation.
        required: false
        type: string
        default: deepseek
      model:
        description: Model name to use for the review.
        required: false
        type: string
      base_url:
        description: Optional provider base URL override.
        required: false
        type: string
      config_path:
        description: Path to the repo review config.
        required: false
        type: string
        default: .ai-code-review.yml
      max_files:
        description: Maximum number of changed files to review in one run.
        required: false
        type: number
        default: 25
      max_patch_chars:
        description: Maximum patch characters to send to the model.
        required: false
        type: number
        default: 120000
      post_summary:
        description: Whether to post a PR summary in addition to inline comments.
        required: false
        type: boolean
        default: true
      min_severity_to_publish:
        description: Minimum severity required before publishing a finding.
        required: false
        type: string
        default: low
    secrets:
      api_key:
        description: API key for the selected LLM provider.
        required: false
      DEEPSEEK_API_KEY:
        description: DeepSeek API key.
        required: false
      BCP_API_KEY:
        description: BCP API key.
        required: false
      OPENAI_API_KEY:
        description: OpenAI API key.
        required: false

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ai-pr-review-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

jobs:
  review:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Picky review
        uses: layerone-labs/picky/.github/actions/ai-pr-review@main
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DEEPSEEK_BASE_URL: ${{ vars.DEEPSEEK_BASE_URL }}
          DEEPSEEK_CODER_MODEL: ${{ vars.DEEPSEEK_CODER_MODEL }}
          BCP_API_KEY: ${{ secrets.BCP_API_KEY }}
          BCP_BASE_URL: ${{ vars.BCP_BASE_URL }}
          BCP_CODER_MODEL: ${{ vars.BCP_CODER_MODEL }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: ${{ vars.OPENAI_BASE_URL }}
          OPENAI_CODER_MODEL: ${{ vars.OPENAI_CODER_MODEL }}
        with:
          provider: ${{ inputs.provider }}
          model: ${{ inputs.model }}
          api_key: ${{ secrets.api_key }}
          base_url: ${{ inputs.base_url }}
          config_path: ${{ inputs.config_path }}
          max_files: ${{ inputs.max_files }}
          max_patch_chars: ${{ inputs.max_patch_chars }}
          post_summary: ${{ inputs.post_summary }}
          min_severity_to_publish: ${{ inputs.min_severity_to_publish }}
